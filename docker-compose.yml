services:
  # ---------------------------------------------------------------------------
  # mesh-hub: the sovereign team-sync hub.
  #
  # Holds the team's markdown history in a git repo + the authoritative sync
  # state in hub.db, both on the /var/lib/mesh-hub volume. Joins the shared
  # dockyard-proxy network so Caddy terminates TLS and routes the public domain
  # to it; the port is only `expose`d, never published to the host. Every
  # endpoint except /healthz is fail-closed bearer auth, so it is safe to face
  # the internet. Invites are minted by an operator with:
  #   docker exec mesh-hub mesh-hub invite --repo /var/lib/mesh-hub/vault --user <name>
  # ---------------------------------------------------------------------------
  mesh-hub:
    build:
      context: .
    image: mesh-hub:latest
    container_name: mesh-hub
    restart: unless-stopped
    expose:
      - "8848"
    environment:
      - MESH_HUB_REPO=/var/lib/mesh-hub/vault
      - MESH_HUB_ADDR=:8848
      - MESH_HUB_GC_HORIZON=${MESH_HUB_GC_HORIZON:-90}
      # Seat cap = the billing gate. 0 = unlimited (your own team). For a paid
      # tenant set this to the plan's seat count; a join past it returns 402.
      - MESH_HUB_MAX_SEATS=${MESH_HUB_MAX_SEATS:-0}
      # Public base URL, so `mesh-hub invite` emits a ready-to-send /invite link.
      - MESH_HUB_PUBLIC_URL=${MESH_HUB_PUBLIC_URL:-https://mesh.brightinteraction.com}
    volumes:
      # Persistent: the git repo (history) + hub.db (tokens, versions). Back this
      # up: hub.db holds non-rebuildable client tokens. The host dir must be
      # owned by uid 1000 (the `mesh` user): chown -R 1000:1000 /var/lib/mesh-hub
      - /var/lib/mesh-hub:/var/lib/mesh-hub
    networks:
      - dockyard-proxy

  # mesh-ui: the web app over the team vault, served under /app at the hub domain.
  # Reuses the mesh-hub image (which cross-builds the `mesh` CLI into mesh-dist) and
  # runs `mesh ui`. Binds all interfaces inside the container, so the token is
  # mandatory (fail-closed): set MESH_UI_TOKEN in /opt/mesh-hub/.env. Caddy routes
  # mesh.brightinteraction.com/app/* here. The vault is mounted rw so the viewer can
  # write its own .mesh/ index (the vault .gitignore excludes it from the hub git).
  mesh-ui:
    image: mesh-hub:latest
    container_name: mesh-ui
    restart: unless-stopped
    depends_on:
      - mesh-hub
    entrypoint: ["/usr/local/share/mesh-dist/mesh-linux-amd64"]
    command: ["ui", "/var/lib/mesh-hub/vault", "--addr", "0.0.0.0:7474", "--base-path", "/app"]
    expose:
      - "7474"
    environment:
      - MESH_UI_TOKEN=${MESH_UI_TOKEN:?set MESH_UI_TOKEN in /opt/mesh-hub/.env}
      # Per-member login: point the UI at the hub's member DB so each teammate signs
      # in with their own scoped account (instead of the shared MESH_UI_TOKEN). Must
      # match the hub's vault.hub.db sibling. Omitting this silently falls back to the
      # shared-token single login, so it stays pinned here to stop a deploy regressing it.
      - MESH_UI_HUB_DB=/var/lib/mesh-hub/vault.hub.db
    volumes:
      - /var/lib/mesh-hub:/var/lib/mesh-hub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/app/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dockyard-proxy

networks:
  dockyard-proxy:
    external: true
